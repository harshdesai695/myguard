name: myguard_frontend
description: "MyGuard — Gated Community Management App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.8.0+1

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Functional Error Handling
  dartz: ^0.10.1

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  cupertino_icons: ^1.0.8

  # QR
  qr_flutter: ^4.1.0
  # mobile_scanner removed temporarily - jni incompatibility with current Dart SDK

  # Image
  image_picker: ^1.1.2

  # Date/Time
  intl: ^0.20.2

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # Serialization
  json_annotation: ^4.9.0

  # Charts
  fl_chart: ^0.70.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.15
  json_serializable: ^6.9.5
  injectable_generator: ^2.7.0

  # Testing
  mocktail: ^1.0.4
  bloc_test: ^10.0.0

  # Linting
  very_good_analysis: ^7.0.0

dependency_overrides:
  path_provider_android: 2.2.12

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
